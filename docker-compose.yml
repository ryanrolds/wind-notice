services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    command: ["python", "app.py"]
    environment:
      - PYTHONUNBUFFERED=1
      - REFRESH_INTERVAL_HOURS=6
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
